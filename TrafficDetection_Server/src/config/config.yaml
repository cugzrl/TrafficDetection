app:
  host: "127.0.0.1"
  port: 8000
  static: "static"

detect:
  conf_thresh: 0.6
  class_names: ["汽车", "面包车", "公交车", "三轮车", "骑电动车的人", "骑自行车的人", "行人"]
  
  # video
  sample_rate: 1

  # frame
  image_sizes: [640, 640]
  quality: 80

  upload_dir: "videos"

tracker:
  track_thresh: 0.01
  track_buffer: 20
  match_thresh: 0.5
  reset_velocity_offset_occ: 3
  reset_pos_offset_occ: 2
  enlarge_bbox_occ: 1.1
  dampen_motion_occ: 0.85
  active_occ_to_lost_thresh: 15
  init_iou_suppress: 0.8